<!DOCTYPE html>
<html lang="en" data-theme="system">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenAlex Research Manager</title>

  <!-- PWA Meta Tags -->
  <meta name="description" content="Search OpenAlex, build your research library, and export BibTeX citations.">
  <meta name="theme-color" content="#3b82f6">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="OpenAlex">

  <!-- Favicon & Touch Icon -->
  <link rel="icon" type="image/png" sizes="32x32" href="img/icon-192.png">
  <link rel="apple-touch-icon" href="img/icon-192.png">

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

  <!-- Custom Styles -->
  <link href="css/style.css" rel="stylesheet">

  <!-- Preload fonts for performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- ========== Navbar ========== -->
  <nav class="navbar oar-navbar px-3">
    <span class="navbar-brand mb-0">
      <i class="bi bi-journal-bookmark-fill me-1"></i>
      OpenAlex Research Manager
    </span>
  </nav>

  <!-- ========== Tab Navigation ========== -->
  <div class="oar-tabs">
    <div class="container-fluid px-3">
      <ul class="nav nav-tabs border-0 flex-nowrap" role="tablist">
        <li class="nav-item" role="presentation">
          <button
            class="nav-link active"
            data-bs-toggle="oar-tab"
            data-tab="tab-search"
            role="tab"
            aria-selected="true"
          >
            <i class="bi bi-search"></i>
            Search
          </button>
        </li>
        <li class="nav-item" role="presentation">
          <button
            class="nav-link"
            data-bs-toggle="oar-tab"
            data-tab="tab-library"
            role="tab"
            aria-selected="false"
          >
            <i class="bi bi-book"></i>
            Library
          </button>
        </li>
        <li class="nav-item" role="presentation">
          <button
            class="nav-link"
            data-bs-toggle="oar-tab"
            data-tab="tab-settings"
            role="tab"
            aria-selected="false"
          >
            <i class="bi bi-gear"></i>
            Settings
          </button>
        </li>
      </ul>
    </div>
  </div>

  <!-- ========== Main Content ========== -->
  <main class="container-fluid">

    <!-- Search Tab -->
    <section id="tab-search" class="tab-panel active" role="tabpanel">
      <!-- Search Controls -->
      <div class="row g-2 mb-3">
        <div class="col-12 col-md">
          <div class="input-group">
            <input type="text" id="search-input" class="form-control" placeholder="Search works..." autofocus>
            <button class="btn btn-oar-primary" id="search-btn" type="button">
              <i class="bi bi-search me-1"></i> Search
            </button>
          </div>
        </div>
      </div>

      <div class="row g-2 mb-3">
        <div class="col-6 col-sm-3 col-md-2">
          <select class="form-select form-select-sm" id="search-mode">
            <option value="keyword">Keyword</option>
            <option value="semantic">Semantic</option>
          </select>
          <label class="form-label text-oar-muted small">Mode</label>
        </div>
        <div class="col-6 col-sm-3 col-md-2" id="scope-col">
          <select class="form-select form-select-sm" id="search-scope">
            <option value="default">Title + Abstract</option>
            <option value="title">Title only</option>
            <option value="fulltext">Full text</option>
          </select>
          <label class="form-label text-oar-muted small">Scope</label>
        </div>
        <div class="col-6 col-sm-3 col-md-2" id="sort-col">
          <select class="form-select form-select-sm" id="search-sort">
            <option value="relevance_score:desc">Relevance</option>
            <option value="cited_by_count:desc">Most cited</option>
            <option value="publication_year:desc">Newest</option>
            <option value="publication_year:asc">Oldest</option>
          </select>
          <label class="form-label text-oar-muted small">Sort</label>
        </div>
        <div class="col-6 col-sm-3 col-md-2">
          <select class="form-select form-select-sm" id="search-limit">
            <option value="10">10 results</option>
            <option value="25" selected>25 results</option>
            <option value="50">50 results</option>
          </select>
          <label class="form-label text-oar-muted small">Per page</label>
        </div>
      </div>

      <!-- Status -->
      <div id="search-status" class="small text-oar-muted mb-2"></div>

      <!-- Batch Controls (hidden by default) -->
      <div id="search-batch" class="d-none mb-3">
        <div class="d-flex align-items-center gap-2">
          <input type="checkbox" class="form-check-input" id="search-select-all">
          <label class="form-check-label small" for="search-select-all">Select all</label>
          <button class="btn btn-sm btn-oar-primary" id="search-save-selected">
            <i class="bi bi-bookmark-plus me-1"></i> Save Selected
          </button>
        </div>
      </div>

      <hr class="my-2">

      <!-- Results Container -->
      <div id="search-results"></div>
    </section>

    <!-- Library Tab -->
    <section id="tab-library" class="tab-panel" role="tabpanel">
      <!-- Library Controls -->
      <div class="row g-2 mb-3">
        <div class="col-12 col-md-4 col-lg-3">
          <div class="input-group input-group-sm">
            <span class="input-group-text"><i class="bi bi-funnel"></i></span>
            <input type="text" id="lib-filter-text" class="form-control" placeholder="Filter by title or abstract...">
            <button class="btn btn-oar-outline" id="lib-refresh-btn" title="Refresh"><i class="bi bi-arrow-clockwise"></i></button>
          </div>
        </div>
        <div class="col-6 col-md-4 col-lg-3">
          <select class="form-select form-select-sm" id="lib-filter-keyword">
            <option value="">All Keywords</option>
          </select>
          <label class="form-label text-oar-muted small d-md-none">Keyword</label>
        </div>
        <div class="col-6 col-md-4 col-lg-3">
          <select class="form-select form-select-sm" id="lib-filter-tag">
            <option value="">All Tags</option>
          </select>
          <label class="form-label text-oar-muted small d-md-none">Tag</label>
        </div>
        <div class="col-6 col-md-4 col-lg-3">
          <select class="form-select form-select-sm" id="lib-sort">
            <option value="date_added">Date added</option>
            <option value="publication_year">Newest</option>
            <option value="cited_by_count">Most cited</option>
            <option value="title">Title</option>
          </select>
          <label class="form-label text-oar-muted small d-md-none">Sort</label>
        </div>
      </div>

      <!-- Batch Controls -->
      <div class="d-flex align-items-center gap-2 mb-2 flex-wrap">
        <input type="checkbox" class="form-check-input" id="lib-select-all">
        <label class="form-check-label small" for="lib-select-all">Select all</label>
        <button class="btn btn-sm btn-oar-primary" id="lib-export-selected" disabled>
          <i class="bi bi-file-earmark-code me-1"></i> Export Selected BibTeX
        </button>
        <button class="btn btn-sm btn-oar-outline" id="lib-fetch-all-bibtex">
          <i class="bi bi-download me-1"></i> Fetch All BibTeX
        </button>
      </div>

      <!-- Status -->
      <div id="lib-status" class="small text-oar-muted mb-2"></div>

      <hr class="my-2">

      <!-- Library Cards Container -->
      <div id="lib-results"></div>
    </section>

    <!-- Settings Tab -->
    <section id="tab-settings" class="tab-panel" role="tabpanel">
      <div class="empty-state">
        <i class="bi bi-gear"></i>
        <h5 class="mb-2">Settings</h5>
        <p>Configure your preferences, API key, and theme options.</p>
      </div>
    </section>

  </main>

  <!-- ========== Footer ========== -->
  <footer class="oar-footer">
    <span class="me-2">OpenAlex Research Manager</span>
    <span class="opacity-50">·</span>
    <span class="ms-2 opacity-75">v0.1.0</span>
  </footer>

  <!-- ========== Scripts ========== -->
  <!-- Dexie.js (global, used by db.js module) -->
  <script src="https://unpkg.com/dexie@latest/dist/dexie.js"></script>

  <!-- Bootstrap 5 JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- App Modules (ES2022 modules) -->
  <script type="module" src="js/db.js"></script>
  <script type="module" src="js/api.js"></script>
  <script type="module" src="js/ui.js"></script>
  <script type="module" src="js/app.js"></script>

</body>
</html>
